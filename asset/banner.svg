  <text x="340" y="204" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="9" fill="#D4A017" opacity="0.28" letter-spacing="2" style="fill:rgb(212, 160, 23);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.28;font-family:&quot;Courier New&quot;, Courier, monospace;font-size:9px;font-weight:400;text-anchor:middle;dominant-baseline:auto">48 4F 4E 45 59 50 4F 54 20 41 43 54 49 56 45</text>
</svg>
