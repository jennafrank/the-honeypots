    <!-- honeycomb hex -->
    <polygon points="28,4 52,17 52,43 28,56 4,43 4,17" fill="#1A1507" stroke="#D4A017" stroke-width="1.2" style="fill:rgb(26, 21, 7);stroke:rgb(212, 160, 23);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- inner detail lines -->
    <line x1="28" y1="4" x2="28" y2="56" stroke="#D4A017" stroke-width="0.4" opacity="0.4" mask="url(#imagine-text-gaps-p8potq)" style="fill:rgb(0, 0, 0);stroke:rgb(212, 160, 23);color:rgb(255, 255, 255);stroke-width:0.4px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="4" y1="17" x2="52" y2="43" stroke="#D4A017" stroke-width="0.4" opacity="0.4" mask="url(#imagine-text-gaps-p8potq)" style="fill:rgb(0, 0, 0);stroke:rgb(212, 160, 23);color:rgb(255, 255, 255);stroke-width:0.4px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="52" y1="17" x2="4" y2="43" stroke="#D4A017" stroke-width="0.4" opacity="0.4" mask="url(#imagine-text-gaps-p8potq)" style="fill:rgb(0, 0, 0);stroke:rgb(212, 160, 23);color:rgb(255, 255, 255);stroke-width:0.4px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- pot body below hex -->
    <rect x="18" y="56" width="20" height="18" rx="2" fill="#1A1507" stroke="#D4A017" stroke-width="1" style="fill:rgb(26, 21, 7);stroke:rgb(212, 160, 23);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <rect x="14" y="70" width="28" height="6" rx="3" fill="#D4A017" opacity="0.6" style="fill:rgb(212, 160, 23);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- drip -->
    <path d="M28 74 Q30 82 28 88" fill="none" stroke="#D4A017" stroke-width="1.2" opacity="0.7" style="fill:none;stroke:rgb(212, 160, 23);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <circle cx="28" cy="89" r="2.5" fill="#D4A017" opacity="0.7" style="fill:rgb(212, 160, 23);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- skull-ish icon inside hex -->
    <text x="28" y="36" text-anchor="middle" font-family="monospace" font-size="16" fill="#D4A017" opacity="0.9" style="fill:rgb(212, 160, 23);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.9;font-family:monospace;font-size:16px;font-weight:400;text-anchor:middle;dominant-baseline:auto">:)</text>
  </g>

  <!-- Right matching pot -->
  <g transform="translate(596, 70)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <polygon points="28,4 52,17 52,43 28,56 4,43 4,17" fill="#1A1507" stroke="#D4A017" stroke-width="1.2" style="fill:rgb(26, 21, 7);stroke:rgb(212, 160, 23);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="28" y1="4" x2="28" y2="56" stroke="#D4A017" stroke-width="0.4" opacity="0.4" mask="url(#imagine-text-gaps-p8potq)" style="fill:rgb(0, 0, 0);stroke:rgb(212, 160, 23);color:rgb(255, 255, 255);stroke-width:0.4px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="4" y1="17" x2="52" y2="43" stroke="#D4A017" stroke-width="0.4" opacity="0.4" mask="url(#imagine-text-gaps-p8potq)" style="fill:rgb(0, 0, 0);stroke:rgb(212, 160, 23);color:rgb(255, 255, 255);stroke-width:0.4px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="52" y1="17" x2="4" y2="43" stroke="#D4A017" stroke-width="0.4" opacity="0.4" mask="url(#imagine-text-gaps-p8potq)" style="fill:rgb(0, 0, 0);stroke:rgb(212, 160, 23);color:rgb(255, 255, 255);stroke-width:0.4px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <rect x="18" y="56" width="20" height="18" rx="2" fill="#1A1507" stroke="#D4A017" stroke-width="1" style="fill:rgb(26, 21, 7);stroke:rgb(212, 160, 23);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <rect x="14" y="70" width="28" height="6" rx="3" fill="#D4A017" opacity="0.6" style="fill:rgb(212, 160, 23);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <path d="M28 74 Q30 82 28 88" fill="none" stroke="#D4A017" stroke-width="1.2" opacity="0.7" style="fill:none;stroke:rgb(212, 160, 23);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <circle cx="28" cy="89" r="2.5" fill="#D4A017" opacity="0.7" style="fill:rgb(212, 160, 23);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <text x="28" y="36" text-anchor="middle" font-family="monospace" font-size="16" fill="#D4A017" opacity="0.9" style="fill:rgb(212, 160, 23);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.9;font-family:monospace;font-size:16px;font-weight:400;text-anchor:middle;dominant-baseline:auto">:)</text>
  </g>

  <!-- Terminal prompt prefix -->
  <text x="148" y="88" font-family="'Courier New', Courier, monospace" font-size="12" fill="#D4A017" opacity="0.55" style="fill:rgb(212, 160, 23);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.55;font-family:&quot;Courier New&quot;, Courier, monospace;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">root@honeypot:~$</text>

  <!-- Main title: SABLE SAINT-CLAIR -->
  <text x="340" y="128" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="46" font-weight="700" letter-spacing="3" fill="#F5C842" style="fill:rgb(245, 200, 66);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Courier New&quot;, Courier, monospace;font-size:46px;font-weight:700;text-anchor:middle;dominant-baseline:auto">SABLE SAINT-CLAIR</text>

  <!-- Subtle scanline / underline -->
  <rect x="148" y="134" width="386" height="1" fill="#D4A017" opacity="0.25" style="fill:rgb(212, 160, 23);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.25;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Subtitle: & the Honey-Pots -->
  <text x="340" y="163" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="19" letter-spacing="6" fill="#D4A017" opacity="0.85" style="fill:rgb(212, 160, 23);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.85;font-family:&quot;Courier New&quot;, Courier, monospace;font-size:19px;font-weight:400;text-anchor:middle;dominant-baseline:auto">&amp; the Honey-Pots</text>

  <!-- blinking cursor at end of title area -->
  <rect x="536" y="108" width="10" height="26" rx="1" fill="#F5C842" opacity="0.85" style="fill:rgb(245, 200, 66);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.113888;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <animate attributeName="opacity" values="0.85;0;0.85" dur="1.1s" repeatCount="indefinite" style="fill:rgb(245, 200, 66);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </rect>

  <!-- small hex accents scattered -->
  <polygon points="140,28 150,33 150,43 140,48 130,43 130,33" fill="none" stroke="#D4A017" stroke-width="0.7" opacity="0.35" style="fill:none;stroke:rgb(212, 160, 23);color:rgb(255, 255, 255);stroke-width:0.7px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <polygon points="530,170 540,175 540,185 530,190 520,185 520,175" fill="none" stroke="#D4A017" stroke-width="0.7" opacity="0.35" style="fill:none;stroke:rgb(212, 160, 23);color:rgb(255, 255, 255);stroke-width:0.7px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <polygon points="320,18 327,22 327,30 320,34 313,30 313,22" fill="none" stroke="#D4A017" stroke-width="0.7" opacity="0.25" style="fill:none;stroke:rgb(212, 160, 23);color:rgb(255, 255, 255);stroke-width:0.7px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.25;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <polygon points="430,185 437,189 437,197 430,201 423,197 423,189" fill="none" stroke="#D4A017" stroke-width="0.7" opacity="0.25" style="fill:none;stroke:rgb(212, 160, 23);color:rgb(255, 255, 255);stroke-width:0.7px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.25;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

