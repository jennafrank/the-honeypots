<svg width="100%" viewBox="0 0 700 230" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Sable Saint-Clair and the Honey-Pots logo banner</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A dark hacker-themed banner with honeycomb hex patterns, a terminal cursor, and stylized text reading "Sable Saint-Clair &amp; the Honey-Pots"</desc>

  <defs>
    <pattern id="hex" x="0" y="0" width="36" height="41.6" patternUnits="userSpaceOnUse">
      <polygon points="18,2 34,11 34,29 18,38 2,29 2,11" fill="none" stroke="#D4A017" stroke-width="0.5" opacity="0.18"/>
    </pattern>
    <clipPath id="banner-clip">
      <rect x="0" y="0" width="680" height="220" rx="12"/>
    </clipPath>
  <mask id="imagine-text-gaps-p8potq" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="700" height="230" fill="white"/><rect x="14.3671875" y="19" width="27.265625" height="23" fill="black" rx="2"/><rect x="14.3671875" y="19" width="27.265625" height="23" fill="black" rx="2"/><rect x="144" y="76" width="123.21875" height="17.5" fill="black" rx="2"/><rect x="75.859375" y="87.5" width="528.28125" height="56.5" fill="black" rx="2"/><rect x="196.78515625" y="145" width="286.4296875" height="25.5" fill="black" rx="2"/><rect x="173.1796875" y="194.5" width="333.640625" height="14" fill="black" rx="2"/></mask></defs>

  <!-- Background -->
  <rect x="0" y="0" width="680" height="220" rx="12" fill="#0D0D0F" style="fill:rgb(13, 13, 15);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Hex grid overlay -->
  <rect x="0" y="0" width="680" height="220" fill="url(#hex)" clip-path="url(#banner-clip)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Amber accent glow left -->
  <ellipse cx="80" cy="110" rx="90" ry="70" fill="#D4A017" opacity="0.06" style="fill:rgb(212, 160, 23);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.06;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Amber accent glow right -->
  <ellipse cx="600" cy="110" rx="90" ry="70" fill="#D4A017" opacity="0.06" style="fill:rgb(212, 160, 23);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.06;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Left decorative honeypot icon: a simple hex pot -->
